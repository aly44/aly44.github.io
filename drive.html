<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Mode - Aly Embaby</title>
  <meta property="og:title" content="Aly Embaby - Interactive Drive Mode">
  <meta property="og:description"
    content="Experience my game development portfolio through an interactive driving experience.">
  <meta property="og:image" content="https://aly44.github.io/Preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ─────────────────────────────────────────
       DRIVE MODE
       Vertical scroll drives the car horizontally
       through the world. Car stays centered;
       world (road, mountains, stops) scrolls past.
    ───────────────────────────────────────── */

    html,
    body {
      background: #04040a;
    }

    /* Hide ambient blobs - we have our own atmosphere */
    .bg-glow {
      display: none;
    }

    /* Custom cursor (matches rest of site) */
    @media (hover: hover) {
      * {
        cursor: none !important;
      }
    }

    #cursor {
      position: fixed;
      left: -100px;
      top: -100px;
      width: 22px;
      height: 22px;
      pointer-events: none;
      z-index: 10001;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease-out, opacity 0.3s;
      opacity: 0;
    }

    #cursor::before,
    #cursor::after {
      content: '';
      position: absolute;
      background: rgba(0, 212, 255, 0.8);
    }

    #cursor::before {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    #cursor::after {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .cur-dot {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--cyan);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #cursor.hov {
      transform: translate(-50%, -50%) scale(1.6);
    }

    /* Scroll progress bar */
    #scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      z-index: 9998;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
    }

    /* ── DRIVE STAGE ── sticky viewport-filling scene */
    .drive-spacer {
      /* Total scroll length determines how long the drive is.
         Bump this up to make the journey longer. */
      height: 2000vh;
      position: relative;
    }

    .drive-stage {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      contain: paint;
    }

    /* ── SKY ── dark with cyan horizon glow, matches site palette */
    .sky {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 100%,
          rgba(0, 212, 255, 0.18) 0%,
          rgba(0, 212, 255, 0.05) 30%,
          transparent 60%),
        linear-gradient(180deg,
          #04040a 0%,
          #06060e 45%,
          #080816 75%,
          #0a0a1c 100%);
    }

    /* ── GALAXY / NEBULA / STARFIELD ──
       Layer order (bottom → top):
       1. nebula clouds (soft cyan/purple/pink radial gradients)
       2. milky-way diagonal band
       3. procedural starfield (dot specks, generated in JS)
       4. bright stars (a handful of glowing larger dots, also JS)
    */
    .nebula {
      position: absolute;
      inset: 0 0 28% 0;
      pointer-events: none;
      background:
        /* large diffuse cyan cloud upper-left */
        radial-gradient(ellipse 70% 55% at 22% 28%,
          rgba(0, 212, 255, 0.18) 0%,
          rgba(0, 212, 255, 0.07) 30%,
          transparent 65%),
        /* purple cloud center */
        radial-gradient(ellipse 60% 45% at 55% 38%,
          rgba(157, 120, 245, 0.16) 0%,
          rgba(157, 120, 245, 0.06) 35%,
          transparent 70%),
        /* pink/magenta wisp upper-right */
        radial-gradient(ellipse 50% 35% at 80% 22%,
          rgba(255, 80, 140, 0.10) 0%,
          rgba(255, 80, 140, 0.04) 35%,
          transparent 70%),
        /* deep cyan glow lower section */
        radial-gradient(ellipse 80% 30% at 50% 70%,
          rgba(0, 212, 255, 0.08) 0%,
          transparent 80%);
      filter: blur(1px);
      mix-blend-mode: screen;
    }

    /* Milky Way: diagonal soft band of brightness */
    .milky-way {
      position: absolute;
      inset: 0 0 28% 0;
      pointer-events: none;
      background: linear-gradient(110deg,
          transparent 35%,
          rgba(255, 255, 255, 0.04) 45%,
          rgba(0, 212, 255, 0.08) 50%,
          rgba(157, 120, 245, 0.06) 55%,
          transparent 65%);
      filter: blur(8px);
      mix-blend-mode: screen;
    }

    /* Star containers - filled with dots by JS */
    .starfield,
    .stars-bright {
      position: absolute;
      inset: 0 0 28% 0;
      pointer-events: none;
    }

    .starfield .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      will-change: opacity;
    }

    .stars-bright .star {
      position: absolute;
      border-radius: 50%;
      will-change: opacity, transform;
      filter: drop-shadow(0 0 3px currentColor);
    }

    @keyframes star-twinkle {

      0%,
      100% {
        opacity: var(--max, 1);
      }

      50% {
        opacity: var(--min, 0.3);
      }
    }

    @keyframes twinkle {
      from {
        opacity: 0.5;
      }

      to {
        opacity: 1;
      }
    }

    /* ── CELESTIAL BODY (Sun/Moon) ── */
    .moon {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 40px #fff, 0 0 100px rgba(0, 212, 255, 0.8);
      top: 15%;
      left: 10%;
      pointer-events: none;
      z-index: 1;
      transition: filter 0.1s ease-out;
    }

    /* ── HYPER-DRIVE WARP EFFECT ── */
    body.warping #car .car {
      animation: warp-stretch 0.5s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 20px var(--cyan)) blur(1px);
    }

    body.warping #speed-lines {
      opacity: 1 !important;
      transform: scaleX(2);
      filter: blur(2px);
    }

    @keyframes warp-stretch {
      0% {
        transform: scaleX(1) translateX(0);
      }

      100% {
        transform: scaleX(1.4) translateX(20px);
      }
    }

    /* ── SCANLINES OVERLAY ── retro/glitch vibe */
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg,
          transparent 0,
          transparent 2px,
          rgba(0, 212, 255, 0.025) 2px,
          rgba(0, 212, 255, 0.025) 3px);
      mix-blend-mode: screen;
      z-index: 20;
    }

    /* very subtle vignette for depth */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
          transparent 50%,
          rgba(0, 0, 0, 0.5) 100%);
      z-index: 21;
    }

    /* shooting star (occasional) */
    .shooter {
      position: absolute;
      top: 20%;
      left: -50px;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      box-shadow: 0 0 6px var(--cyan);
      opacity: 0;
      animation: shoot 9s linear infinite;
      animation-delay: 3s;
    }

    .shooter.b {
      top: 12%;
      animation-duration: 14s;
      animation-delay: 7s;
    }

    @keyframes shoot {
      0% {
        transform: translate(0, 0) rotate(15deg);
        opacity: 0;
      }

      2% {
        opacity: 1;
      }

      8% {
        transform: translate(110vw, 30vh) rotate(15deg);
        opacity: 0;
      }

      100% {
        transform: translate(110vw, 30vh) rotate(15deg);
        opacity: 0;
      }
    }

    /* ── MOUNTAINS (parallax layers) ── */
    .mountains-far,
    .mountains-near {
      position: absolute;
      bottom: 28%;
      left: 0;
      width: 3000%;
      /* extremely wide to never end during overscroll */
      height: 220px;
      display: flex;
      /* lay out tiled svgs */
      will-change: transform;
    }

    .mountains-far {
      bottom: 32%;
      height: 180px;
      opacity: 0.55;
    }

    .mountains-far svg,
    .mountains-near svg {
      display: block;
      width: 300vw;
      /* each tile is 3 screen widths */
      flex-shrink: 0;
      height: 100%;
    }

    /* ── GROUND / ROAD ── */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 28%;
      background: linear-gradient(180deg,
          #08081a 0%,
          #050514 50%,
          #020208 100%);
      border-top: 1px solid rgba(0, 212, 255, 0.4);
      box-shadow: 0 -12px 50px rgba(0, 212, 255, 0.15) inset;
    }

    /* gentle reflective sheen on the road */
    .ground::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 100% at 50% 0%,
          rgba(0, 212, 255, 0.10) 0%,
          transparent 60%);
    }

    /* horizon fog band - softens where ground meets sky */
    .fog {
      position: absolute;
      bottom: 22%;
      left: 0;
      right: 0;
      height: 12%;
      background: linear-gradient(180deg,
          transparent 0%,
          rgba(0, 212, 255, 0.04) 40%,
          rgba(8, 8, 22, 0.5) 100%);
      filter: blur(6px);
      pointer-events: none;
      z-index: 2;
    }

    .horizon-glow {
      position: absolute;
      bottom: 28%;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
          transparent,
          rgba(0, 212, 255, 0.5) 30%,
          rgba(157, 120, 245, 0.45) 50%,
          rgba(0, 212, 255, 0.5) 70%,
          transparent);
      box-shadow:
        0 0 18px rgba(0, 212, 255, 0.6),
        0 0 40px rgba(0, 212, 255, 0.2);
    }

    /* Road dashes - they scroll with the world, at the wheel line */
    .road-dashes {
      position: absolute;
      bottom: 13%;
      left: 0;
      width: 3000%;
      height: 4px;
      background-image: linear-gradient(90deg,
          rgba(0, 212, 255, 0.7) 0,
          rgba(0, 212, 255, 0.7) 60px,
          transparent 60px,
          transparent 120px);
      background-size: 120px 4px;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
      will-change: transform;
    }

    /* ── WORLD (where stops live) ── */
    .world {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1000%;
      /* must match parallax layer math */
      height: 100%;
      will-change: transform;
      pointer-events: none;
      /* let card buttons live above */
    }

    /* World contents (stops) get pointer events */
    .world>* {
      pointer-events: auto;
    }

    /* ── STOP MARKER (signpost) ── */
    .stop {
      position: absolute;
      bottom: 22%;
      width: 220px;
      transform: translateX(-50%);
    }

    .stop .signpost {
      position: relative;
      width: 8px;
      height: 110px;
      margin: 0 auto;
      background: linear-gradient(180deg, #2a2a3a, #14141e);
      border-radius: 3px;
    }

    .stop .billboard {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      min-width: 200px;
      padding: 10px 16px;
      background: rgba(10, 10, 20, 0.92);
      border: 1px solid rgba(0, 212, 255, 0.5);
      border-radius: 6px;
      color: var(--cyan);
      font-family: var(--font-head);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      box-shadow:
        0 0 20px rgba(0, 212, 255, 0.3),
        0 4px 12px rgba(0, 0, 0, 0.5);
    }

    /* glitch effect on billboard text - random RGB shift */
    .stop .billboard::before {
      content: attr(data-text);
      position: absolute;
      inset: 10px 16px;
      color: #ff2d78;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .stop .billboard.glitch::before {
      animation: bb-glitch 0.4s steps(2);
    }

    @keyframes bb-glitch {

      0%,
      100% {
        transform: translate(0, 0);
        opacity: 0;
      }

      20% {
        transform: translate(-2px, 1px);
        opacity: 0.8;
      }

      40% {
        transform: translate(2px, -1px);
        opacity: 0.6;
      }

      60% {
        transform: translate(-1px, 0);
        opacity: 0.7;
      }

      80% {
        transform: translate(1px, 1px);
        opacity: 0.4;
      }
    }

    .stop .billboard::after {
      /* tiny tail pointing to signpost */
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 10px;
      height: 10px;
      background: rgba(10, 10, 20, 0.92);
      border-right: 1px solid rgba(0, 212, 255, 0.5);
      border-bottom: 1px solid rgba(0, 212, 255, 0.5);
    }

    /* Active stop: pulse the billboard */
    .stop.active .billboard {
      animation: stop-pulse 1.4s ease-in-out infinite;
      border-color: var(--cyan);
      color: #fff;
    }

    @keyframes stop-pulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), 0 4px 12px rgba(0, 0, 0, 0.5);
      }

      50% {
        box-shadow: 0 0 35px rgba(0, 212, 255, 0.85), 0 4px 12px rgba(0, 0, 0, 0.5);
      }
    }

    /* ── CAR ── stays centered, world moves */
    .car-wrap {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 90px;
      z-index: 10;
      will-change: transform;
    }

    .car {
      position: absolute;
      inset: 0;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.6));
    }

    .car-body {
      position: absolute;
      bottom: 18px;
      left: 0;
      width: 180px;
      height: 32px;
      background: linear-gradient(180deg, #00d4ff 0%, #0099c2 60%, #006e8c 100%);
      border-radius: 10px 28px 8px 8px;
      box-shadow:
        inset 0 -3px 0 rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 28px rgba(0, 212, 255, 0.5);
    }

    .car-roof {
      position: absolute;
      bottom: 46px;
      left: 38px;
      width: 96px;
      height: 26px;
      background: linear-gradient(180deg, #14141e 0%, #0a0a14 100%);
      border-radius: 16px 16px 4px 4px;
      border: 1px solid rgba(0, 212, 255, 0.4);
      box-shadow: inset 0 1px 0 rgba(0, 212, 255, 0.15);
    }

    .car-window {
      position: absolute;
      bottom: 50px;
      left: 46px;
      width: 80px;
      height: 18px;
      background: linear-gradient(180deg, rgba(0, 212, 255, 0.4), rgba(0, 212, 255, 0.1));
      border-radius: 10px 10px 2px 2px;
    }

    .car-headlight {
      position: absolute;
      bottom: 30px;
      right: 0;
      width: 8px;
      height: 6px;
      background: var(--cyan);
      border-radius: 2px;
      box-shadow:
        0 0 12px var(--cyan),
        0 0 24px rgba(0, 212, 255, 0.5);
    }

    .car-taillight {
      position: absolute;
      bottom: 30px;
      left: 2px;
      width: 6px;
      height: 5px;
      background: #5a1830;
      border-radius: 2px;
      transition: background 0.18s, box-shadow 0.18s;
    }

    /* brakes engaged when car is at/near a stop */
    .car-wrap.braking .car-taillight {
      background: #ff3060;
      box-shadow: 0 0 14px #ff3060, 0 0 28px rgba(255, 48, 96, 0.5);
    }

    /* headlight cone projecting forward and slightly down */
    .headlight-cone {
      position: absolute;
      bottom: 3px;
      left: 176px;
      width: 260px;
      height: 60px;
      background: linear-gradient(90deg,
          rgba(0, 212, 255, 0.35) 0%,
          rgba(0, 212, 255, 0.1) 60%,
          transparent 100%);
      clip-path: polygon(0% 40%, 0% 60%, 100% 100%, 100% 0%);
      filter: blur(4px);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .car-wrap.braking .headlight-cone {
      opacity: 0.4;
    }

    /* underglow */
    .car-underglow {
      position: absolute;
      bottom: -2px;
      left: 8px;
      width: 164px;
      height: 14px;
      background: radial-gradient(ellipse, rgba(0, 212, 255, 0.6), transparent 70%);
      filter: blur(3px);
      pointer-events: none;
    }

    /* number stencil on door */
    .car-number {
      position: absolute;
      bottom: 22px;
      left: 70px;
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      user-select: none;
    }

    /* exhaust puff */
    .exhaust {
      position: absolute;
      bottom: 18px;
      left: -8px;
      width: 14px;
      height: 8px;
      background: radial-gradient(ellipse, rgba(180, 200, 230, 0.5), transparent 70%);
      filter: blur(2px);
      opacity: 0;
      pointer-events: none;
    }

    .car-wrap.zooming .exhaust {
      animation: puff 0.5s linear;
    }

    @keyframes puff {
      0% {
        opacity: 0.7;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-30px, -10px) scale(2);
      }
    }

    .wheel {
      position: absolute;
      bottom: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, #1a1a26 30%, #0a0a14 70%);
      border: 2px solid #2a2a3a;
      will-change: transform;
    }

    .wheel::before {
      content: '';
      position: absolute;
      inset: 30%;
      border-radius: 50%;
      background: #00d4ff;
      box-shadow: 0 0 6px rgba(0, 212, 255, 0.6);
    }

    .wheel::after {
      /* spokes - rotate with the wheel */
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background:
        linear-gradient(0deg, transparent 47%, rgba(0, 212, 255, 0.5) 49%, rgba(0, 212, 255, 0.5) 51%, transparent 53%),
        linear-gradient(90deg, transparent 47%, rgba(0, 212, 255, 0.5) 49%, rgba(0, 212, 255, 0.5) 51%, transparent 53%);
    }

    .wheel.front {
      right: 12px;
    }

    .wheel.back {
      left: 12px;
    }

    /* ── PROJECT CARD ── reveals when car is at a stop
       Positioned upper-center so the car at the bottom of the screen
       remains visible during the reveal. */
    .stop-card {
      position: fixed;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%) scale(0.96);
      width: min(640px, 92vw);
      max-height: 62vh;
      overflow-y: auto;
      background: rgba(8, 8, 16, 0.92);
      border: 1px solid rgba(0, 212, 255, 0.45);
      border-radius: 10px;
      padding: 16px 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.05) inset,
        0 0 40px rgba(0, 212, 255, 0.2),
        0 12px 50px rgba(0, 0, 0, 0.7);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.4s ease,
        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
        clip-path 0.45s ease;
      z-index: 50;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    }

    .stop-card.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    /* corner brackets (matches projects.html aesthetic) */
    .stop-card::before,
    .stop-card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--cyan);
      border-style: solid;
      border-width: 0;
      pointer-events: none;
    }

    .stop-card::before {
      top: -1px;
      left: -1px;
      border-top-width: 1px;
      border-left-width: 1px;
    }

    .stop-card::after {
      bottom: -1px;
      right: -1px;
      border-bottom-width: 1px;
      border-right-width: 1px;
    }

    /* card head row: engine + index stamp */
    .stop-card .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .stop-card .card-engine {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      color: var(--cyan);
      text-transform: uppercase;
      padding: 3px 10px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 999px;
    }

    .stop-card .card-index {
      font-family: var(--font-head);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted2);
    }

    .stop-card h2 {
      font-family: var(--font-head);
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
      color: var(--text);
      position: relative;
      display: inline-block;
    }

    /* glitch flash on title when card opens */
    .stop-card.active h2 {
      animation: title-glitch 0.5s steps(2);
    }

    @keyframes title-glitch {
      0% {
        transform: translate(-3px, 0);
        color: #ff2d78;
      }

      20% {
        transform: translate(2px, 0);
        color: var(--cyan);
      }

      40% {
        transform: translate(-1px, 0);
        color: var(--text);
      }

      60%,
      100% {
        transform: translate(0, 0);
        color: var(--text);
      }
    }

    .stop-card video {
      width: 100%;
      max-height: 30vh;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      margin-bottom: 10px;
      display: block;
    }

    .stop-card p {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .stop-card .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .stop-card .card-tags span {
      font-family: var(--font-head);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(0, 212, 255, 0.08);
      color: var(--cyan);
    }

    /* ── CARD LINK / TOGGLE ── */
    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyan);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .card-link:hover {
      color: #fff;
    }

    .card-link .card-link-arrow {
      transition: transform 0.3s;
      display: inline-block;
    }

    .stop-card.expanded .card-link .card-link-arrow {
      transform: rotate(90deg);
    }

    /* ── EXPANDABLE DETAILS PANEL ── */
    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
      opacity: 0;
    }

    .stop-card.expanded .card-details {
      max-height: 600px;
      opacity: 1;
    }

    .card-details-inner {
      padding-top: 14px;
      border-top: 1px solid rgba(0, 212, 255, 0.15);
      margin-top: 14px;
    }

    /* thumbnail row */
    .card-thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .card-thumbs img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid rgba(0, 212, 255, 0.18);
      transition: transform 0.25s, border-color 0.25s;
      cursor: pointer;
    }

    .card-thumbs img:hover {
      transform: scale(1.04);
      border-color: rgba(0, 212, 255, 0.55);
    }

    /* bullet points */
    .card-bullets {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-bullets li {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.55;
      padding-left: 1rem;
      position: relative;
    }

    .card-bullets li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--cyan);
      font-weight: 700;
    }

    /* full details link at bottom of expanded */
    .card-proj-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 14px;
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .card-proj-link:hover {
      color: var(--cyan);
      border-color: rgba(0, 212, 255, 0.5);
    }

    /* ── HUD ── ticker on the side */
    .hud {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 14px;
      pointer-events: auto;
    }

    .hud-stop {
      position: relative;
      width: 32px;
      text-align: right;
      font-family: var(--font-head);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted2);
      transition: color 0.3s ease, background 0.2s;
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 3px;
      user-select: none;
    }

    .hud-stop:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .hud-stop.passed {
      color: rgba(0, 212, 255, 0.6);
    }

    .hud-stop.active {
      color: var(--cyan);
    }

    .hud-stop.active::before {
      content: '';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--cyan);
    }

    /* ── HINT (intro overlay) ── */
    .drive-hint {
      position: fixed;
      bottom: 68px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-head);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 40;
      animation: hint-bob 2s ease-in-out infinite;
      pointer-events: none;
      text-align: center;
    }

    .hint-key {
      display: inline-block;
      padding: 2px 7px;
      margin: 0 2px;
      border: 1px solid rgba(0, 212, 255, 0.4);
      border-radius: 4px;
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.05);
    }

    @keyframes hint-bob {

      0%,
      100% {
        opacity: 0.4;
        transform: translate(-50%, 0);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -4px);
      }
    }

    .drive-hint.hidden {
      opacity: 0;
      transition: opacity 0.5s;
    }

    /* ── SPEEDOMETER ── bottom-left */
    .speedo {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 40;
      font-family: var(--font-head);
      color: var(--cyan);
      pointer-events: none;
      user-select: none;
    }

    .speedo-num {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
      font-variant-numeric: tabular-nums;
    }

    .speedo-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-top: 2px;
    }

    .speedo-bar {
      width: 110px;
      height: 3px;
      margin-top: 6px;
      background: rgba(0, 212, 255, 0.12);
      overflow: hidden;
      border-radius: 2px;
    }

    .speedo-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
      transition: width 0.12s ease-out;
    }

    /* ── HONK FLASH ── full-screen pulse */
    .honk-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
          rgba(0, 212, 255, 0.0) 0%,
          rgba(0, 212, 255, 0.0) 100%);
      z-index: 9000;
      transition: opacity 0.4s;
      opacity: 0;
    }

    .honk-flash.go {
      animation: honk 0.55s ease-out;
    }

    @keyframes honk {
      0% {
        opacity: 0;
        background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.5) 0%, transparent 30%);
      }

      30% {
        opacity: 1;
        background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.5) 0%, transparent 70%);
      }

      100% {
        opacity: 0;
        background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.5) 0%, transparent 100%);
      }
    }

    /* HONK! text */
    .honk-text {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      font-family: var(--font-head);
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--cyan);
      text-shadow:
        0 0 20px rgba(0, 212, 255, 0.8),
        2px 0 0 #ff2d78,
        -2px 0 0 #00d4ff;
      pointer-events: none;
      opacity: 0;
      z-index: 9001;
    }

    .honk-text.go {
      animation: honk-pop 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes honk-pop {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.6) rotate(-6deg);
      }

      30% {
        opacity: 1;
        transform: translateX(-50%) scale(1.15) rotate(2deg);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) scale(1.3) rotate(0deg);
      }
    }

    /* ── BACK TO GRID LINK ── */
    .grid-link {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 40;
      font-family: var(--font-head);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(10, 10, 20, 0.6);
      backdrop-filter: blur(8px);
      transition: color 0.2s, border-color 0.2s;
    }

    .grid-link:hover {
      color: var(--cyan);
      border-color: rgba(0, 212, 255, 0.4);
    }

    /* ── ENGINE-TINTED BILLBOARDS ── */
    .billboard.eng-unity {
      border-color: rgba(0, 232, 122, 0.65);
      color: var(--green);
    }

    .billboard.eng-unreal {
      border-color: rgba(157, 120, 245, 0.65);
      color: var(--purple);
    }

    .billboard.eng-cpp {
      border-color: rgba(255, 160, 50, 0.65);
      color: #ffa030;
    }

    .stop.eng-unity .billboard::after {
      border-right-color: rgba(0, 232, 122, 0.65);
      border-bottom-color: rgba(0, 232, 122, 0.65);
    }

    .stop.eng-unreal .billboard::after {
      border-right-color: rgba(157, 120, 245, 0.65);
      border-bottom-color: rgba(157, 120, 245, 0.65);
    }

    .stop.eng-cpp .billboard::after {
      border-right-color: rgba(255, 160, 50, 0.65);
      border-bottom-color: rgba(255, 160, 50, 0.65);
    }

    .stop.active.eng-unity .billboard {
      animation: stop-pulse-g 1.4s ease-in-out infinite;
      color: #fff;
      border-color: var(--green);
    }

    .stop.active.eng-unreal .billboard {
      animation: stop-pulse-p 1.4s ease-in-out infinite;
      color: #fff;
      border-color: var(--purple);
    }

    @keyframes stop-pulse-g {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(0, 232, 122, 0.35), 0 4px 12px rgba(0, 0, 0, 0.5);
      }

      50% {
        box-shadow: 0 0 38px rgba(0, 232, 122, 0.8), 0 4px 12px rgba(0, 0, 0, 0.5);
      }
    }

    @keyframes stop-pulse-p {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(157, 120, 245, 0.35), 0 4px 12px rgba(0, 0, 0, 0.5);
      }

      50% {
        box-shadow: 0 0 38px rgba(157, 120, 245, 0.8), 0 4px 12px rgba(0, 0, 0, 0.5);
      }
    }

    /* ── CAPSTONE STOP ── taller post, bigger board, CAPSTONE badge */
    .stop.capstone .signpost {
      height: 130px;
    }

    .stop.capstone .billboard {
      padding: 12px 22px;
      font-size: 0.85rem;
      min-width: 220px;
    }

    .capstone-badge {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-head);
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: var(--green);
      color: #04040a;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── JOURNEY BAR (mini-map bottom-center) ── */
    .journey-bar {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .journey-track {
      position: relative;
      width: 260px;
      height: 3px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 2px;
    }

    .journey-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      border-radius: 2px;
      transition: width 0.08s linear;
    }

    .journey-pos {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 9px;
      height: 9px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--cyan);
      transition: left 0.08s linear;
    }

    .journey-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .journey-dot.passed {
      background: rgba(0, 212, 255, 0.4);
    }

    .journey-dot.active {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      width: 7px;
      height: 7px;
    }

    .journey-label {
      font-family: var(--font-head);
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    /* ── CARD VIEW DETAILS LINK ── */
    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 212, 255, 0.35);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .card-link:hover {
      color: #fff;
      border-color: rgba(0, 212, 255, 0.8);
    }

    /* ── WORLD SIGNS (start / end) ── */
    .world-sign {
      position: absolute;
      bottom: 30%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .world-sign .sign-box {
      position: relative;
      background: rgba(8, 8, 16, 0.92);
      border: 1px solid rgba(0, 212, 255, 0.28);
      border-radius: 8px;
      padding: 18px 28px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.04) inset,
        0 0 30px rgba(0, 212, 255, 0.12),
        0 12px 40px rgba(0, 0, 0, 0.65);
      margin-bottom: 4px;
      white-space: nowrap;
    }

    /* corner brackets — matching stop-card style */
    .world-sign .sign-box::before,
    .world-sign .sign-box::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: rgba(0, 212, 255, 0.6);
      border-style: solid;
      border-width: 0;
    }

    .world-sign .sign-box::before {
      top: -1px;
      left: -1px;
      border-top-width: 1px;
      border-left-width: 1px;
    }

    .world-sign .sign-box::after {
      bottom: -1px;
      right: -1px;
      border-bottom-width: 1px;
      border-right-width: 1px;
    }

    .world-sign .sign-overline {
      font-family: var(--font-head);
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 8px;
    }

    .world-sign .sign-title {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.1;
      position: relative;
      display: inline-block;
    }

    /* glitch effect for signs */
    .sign-title.glitch-text::before,
    .sign-title.glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.8;
    }

    .sign-title.glitch-text::before {
      color: #ff2d78;
      z-index: -1;
      animation: glitch-a 3s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
    }

    .sign-title.glitch-text::after {
      color: var(--cyan);
      z-index: -2;
      animation: glitch-b 3s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 85%, 0 85%);
    }

    .world-sign .sign-sub {
      font-family: var(--font-head);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .world-sign.sign-end .sign-box {
      border-color: rgba(0, 212, 255, 0.5);
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.06) inset,
        0 0 40px rgba(0, 212, 255, 0.22),
        0 12px 40px rgba(0, 0, 0, 0.65);
    }

    .world-sign.sign-end .sign-title {
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .world-sign .sign-post {
      width: 6px;
      height: 70px;
      background: linear-gradient(180deg, rgba(0, 212, 255, 0.4), #14141e);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
    }

    /* mobile note */
    @media (max-width: 720px) {
      .drive-stage {
        display: none;
      }

      .mobile-note {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
        font-family: var(--font-body);
        color: var(--muted);
      }
    }

    @media (min-width: 721px) {
      .mobile-note {
        display: none;
      }
    }

    /* ── CINEMATIC FADE-IN ── */
    #scene-fade {
      position: fixed;
      inset: 0;
      background: #04040a;
      z-index: 9999;
      pointer-events: none;
      animation: scene-fade-in 1.8s ease-out forwards;
      animation-delay: 0.2s;
    }

    @keyframes scene-fade-in {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    /* ── SPEED LINES ── */
    #speed-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 22;
      opacity: 0;
      transition: opacity 0.15s;
      background:
        linear-gradient(90deg, rgba(0, 212, 255, 0.14) 0%, transparent 11%),
        linear-gradient(90deg, transparent 89%, rgba(0, 212, 255, 0.10) 100%);
    }

    #speed-lines::after {
      content: '';
      position: absolute;
      inset: 10% 0;
      background: repeating-linear-gradient(180deg,
          transparent 0, transparent 7px,
          rgba(0, 212, 255, 0.028) 7px, rgba(0, 212, 255, 0.028) 8px);
      -webkit-mask-image: linear-gradient(90deg, black 0%, transparent 13%, transparent 87%, black 100%);
      mask-image: linear-gradient(90deg, black 0%, transparent 13%, transparent 87%, black 100%);
    }

    /* ── DUST PARTICLES ── */
    .dust {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 8;
      filter: blur(1.5px);
      animation: dust-fwd 0.75s ease-out forwards;
    }

    .dust.rev {
      animation-name: dust-rev;
    }

    @keyframes dust-fwd {
      0% {
        opacity: 0.65;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-55px, -16px) scale(3);
      }
    }

    @keyframes dust-rev {
      0% {
        opacity: 0.65;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(55px, -16px) scale(3);
      }
    }

    /* ── CAMERA SHAKE on arrival ── */
    @keyframes cam-shake {

      0%,
      100% {
        transform: none;
      }

      15% {
        transform: translate(-4px, 2px);
      }

      30% {
        transform: translate(4px, -3px);
      }

      50% {
        transform: translate(-3px, 1px);
      }

      70% {
        transform: translate(3px, -1px);
      }

      90% {
        transform: translate(-1px, 0);
      }
    }

    .drive-stage.arrive {
      animation: cam-shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    /* ── REVERSE TAG ── */
    #reverse-tag {
      position: fixed;
      bottom: 105px;
      left: 26px;
      font-family: var(--font-head);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #ff3060;
      pointer-events: none;
      z-index: 40;
      opacity: 0;
      transition: opacity 0.2s;
      text-shadow: 0 0 12px rgba(255, 48, 96, 0.6);
    }

    #reverse-tag.on {
      opacity: 1;
    }

    /* ── END SIGN clickable ── */
    .world-sign.sign-end {
      pointer-events: auto;
      cursor: pointer;
    }

    .world-sign.sign-end:hover .sign-box {
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.1) inset,
        0 0 60px rgba(0, 212, 255, 0.35),
        0 12px 40px rgba(0, 0, 0, 0.65);
      border-color: rgba(0, 212, 255, 0.8);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    // ─── PROCEDURAL STARFIELD ───
    // Build a deep starfield: ~220 small twinkling dots + ~16 bright glowing ones.
    // Stars cluster slightly toward the upper sky and along a Milky-Way-like band.
    (function buildStars() {
      const fld = document.getElementById('starfield');
      const brt = document.getElementById('stars-bright');
      if (!fld || !brt) return;

      // Seedable RNG so the field looks consistent across reloads
      let seed = 1337;
      const rand = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };

      const colors = [
        'rgba(255,255,255,1)', 'rgba(255,255,255,1)', 'rgba(255,255,255,1)',
        'rgba(0,212,255,1)', 'rgba(0,212,255,1)',
        'rgba(157,120,245,1)',
        'rgba(255,200,220,1)'
      ];
      const brightColors = ['#ffffff', '#ffffff', '#00d4ff', '#9d78f5', '#ffe0a0'];

      // Density falls off toward the horizon (lower y in 0..1 = top of sky)
      // So we sample y with a bias that favors the upper portion.
      function sampleY() {
        // pow < 1 pushes values toward 0 (top); >1 toward 1 (bottom).
        return Math.pow(rand(), 0.7);
      }

      // Small twinkling stars
      const SMALL = 220;
      let smallHTML = '';
      for (let i = 0; i < SMALL; i++) {
        const x = rand() * 100;
        const y = sampleY() * 100;
        const size = rand() < 0.85 ? 1 : (rand() < 0.5 ? 1.5 : 2);
        const color = colors[Math.floor(rand() * colors.length)];
        const minOp = 0.2 + rand() * 0.3;
        const maxOp = 0.7 + rand() * 0.3;
        const dur = 2 + rand() * 5;
        const delay = -(rand() * dur);
        smallHTML += `<div class="star" style="
          left:${x}%; top:${y}%;
          width:${size}px; height:${size}px;
          background:${color};
          --min:${minOp}; --max:${maxOp};
          opacity:${maxOp};
          animation: star-twinkle ${dur}s ease-in-out infinite;
          animation-delay: ${delay}s;
        "></div>`;
      }
      fld.innerHTML = smallHTML;

      // A few bright glowing stars with halos
      const BRIGHT = 18;
      let brightHTML = '';
      for (let i = 0; i < BRIGHT; i++) {
        const x = rand() * 100;
        const y = sampleY() * 70;     // bright stars cluster higher
        const size = 2 + rand() * 2.5;
        const color = brightColors[Math.floor(rand() * brightColors.length)];
        const dur = 2.5 + rand() * 4;
        const delay = -(rand() * dur);
        brightHTML += `<div class="star" style="
          left:${x}%; top:${y}%;
          width:${size}px; height:${size}px;
          background:${color}; color:${color};
          --min:0.5; --max:1;
          opacity:1;
          animation: star-twinkle ${dur}s ease-in-out infinite;
          animation-delay: ${delay}s;
        "></div>`;
      }
      brt.innerHTML = brightHTML;
    })();

    // Start sign — at p=0, worldPct = (0 * 9 + 0.5) / 10 = 0.05 (5%)
    const startSign = document.createElement('div');
    startSign.className = 'world-sign sign-start';
    startSign.style.left = '5%';
    startSign.innerHTML = `
      <div class="sign-box">
        <div class="sign-overline">Aly Embaby &bull; Portfolio</div>
        <div class="sign-title glitch-text" data-text="Drive Mode.">Drive Mode.</div>
        <div style="margin-top:10px; font-size:0.6rem; opacity:0.6; letter-spacing:0.1em; font-family:var(--font-body)">
          DRIVE FORWARD TO BEGIN
        </div>
      </div>
    `;
    world.appendChild(startSign);

    // End sign — at p=1, worldPct = (1 * 9 + 0.5) / 10 = 0.95 (95%)
    const endSign = document.createElement('div');
    endSign.className = 'world-sign sign-end';
    endSign.style.left = '95%';
    endSign.innerHTML = `
      <div class="sign-box">
        <div class="sign-overline">End of the Road</div>
        <div class="sign-title glitch-text" data-text="Let's Connect.">Let's Connect.</div>
        <div class="sign-sub">Let's work together</div>
      </div>
      <div class="sign-post"></div>`;
    world.appendChild(endSign);
    // Clicking End sign: honk then go to contact page
    endSign.addEventListener('click', () => {
      honk();
      setTimeout(() => { window.location.href = 'contact.html'; }, 700);
    });

    const engineClass = { unity: 'eng-unity', unreal: 'eng-unreal', cpp: 'eng-cpp' };

    STOPS.forEach((s, i) => {
      const cls = engineClass[s.type] || '';
      const stop = document.createElement('div');
      stop.className = 'stop' + (cls ? ' ' + cls : '') + (s.capstone ? ' capstone' : '');
      stop.style.left = (s.pct * 100) + '%';
      stop.dataset.idx = i;
      stop.innerHTML = `
        <div class="signpost">
          <div class="billboard ${cls}" data-text="${s.title}">
            ${s.capstone ? '<span class="capstone-badge">Capstone</span>' : ''}
            ${s.title}
          </div>
        </div>
      `;
      world.appendChild(stop);

      const tick = document.createElement('div');
      tick.className = 'hud-stop';
      tick.dataset.idx = i;
      tick.textContent = String(i + 1).padStart(2, '0');
      hud.appendChild(tick);
    });

    // ─── REFS ───
    const stage = document.querySelector('.drive-stage');
    const spacer = document.querySelector('.drive-spacer');
    const mtnFar = document.getElementById('mtn-far');
    const mtnNear = document.getElementById('mtn-near');
    const dashes = document.getElementById('dashes');
    const car = document.getElementById('car');
    const wheelF = document.getElementById('wheelF');
    const wheelB = document.getElementById('wheelB');
    const stopCard = document.getElementById('stop-card');
    const cardTitle = document.getElementById('card-title');
    const cardEngine = document.getElementById('card-engine');
    const cardVideo = document.getElementById('card-video');
    const cardDesc = document.getElementById('card-desc');
    const cardTags = document.getElementById('card-tags');
    const cardIndex = document.getElementById('card-index');
    const progressBar = document.getElementById('scroll-progress');
    const hint = document.getElementById('hint');
    const stopEls = document.querySelectorAll('.stop');
    const tickEls = document.querySelectorAll('.hud-stop');
    const speedoNum = document.getElementById('speedo-num');
    const speedoFill = document.getElementById('speedo-fill');
    const honkFlash = document.getElementById('honk-flash');
    const honkText = document.getElementById('honk-text');
    const cardLink = document.getElementById('card-link');
    const cardDetails = document.getElementById('card-details');
    const cardThumbs = document.getElementById('card-thumbs');
    const cardBullets = document.getElementById('card-bullets');
    const cardProjLink = document.getElementById('card-proj-link');
    const journeyFill = document.getElementById('journey-fill');
    const journeyPos = document.getElementById('journey-pos');
    const journeyLabel = document.getElementById('journey-label');
    const speedLines = document.getElementById('speed-lines');
    const reverseTag = document.getElementById('reverse-tag');
    const sky = document.querySelector('.sky');
    const nebula = document.querySelector('.nebula');
    const milkyWay = document.querySelector('.milky-way');
    const starfield = document.getElementById('starfield');
    const starsBright = document.getElementById('stars-bright');
    // Journey dots are built after aligned[] is ready - see below

    let lastScrollY = 0;
    let scrollVel = 0;
    let wheelRot = 0;
    let activeStop = -1;
    let isFacingBackward = false;

    // World scroll math:
    // The .world is 300% wide. We translate it from 0% to -200% as we scroll.
    // Stops at pct=0.18 means at world's natural left:18% they appear.
    // We want car (centered at 50% of viewport) to align with the stop when
    // worldOffset places stop's screen position at 50%.
    //
    // Stop screen X = worldX + (worldWidth * pct)   // worldX is negative
    // For stop to be at viewport center: stop screen X = vw/2
    // worldX = vw/2 - worldWidth * pct
    // We map progress p (0→1) to worldX going from leftmost (0) to rightmost (-(ww - vw))
    // and want stop to align when p = pct... so simplest mapping:
    // worldX = -p * (worldWidth - vw)
    // For stop's screen X to hit center: -p*(ww - vw) + ww*pct = vw/2
    // => p = (ww*pct - vw/2) / (ww - vw)
    // With ww=3*vw: p = (3*pct - 0.5) / 2
    // That gives: pct=0.18 → p=0.02 (too early), pct=0.5 → p=0.5, pct=0.82 → p=0.98
    //
    // We want first stop to land somewhere comfortable like p=0.10, last at p=0.82.
    // Since worldWidth = 10 * vw, the formula is:
    // p = (10*pct - 0.5) / 9
    // So to place a stop, we inverse it: pct = (p_target * 9 + 0.5) / 10
    function alignedStops() {
      return STOPS.map(s => ({
        ...s,
        worldPct: (s.pct * 9 + 0.5) / 10
      }));
    }

    // Re-position stops using the aligned math
    const aligned = alignedStops();
    document.querySelectorAll('.stop').forEach((el, i) => {
      el.style.left = (aligned[i].worldPct * 100) + '%';
    });

    // ─── JOURNEY DOTS ───
    const journeyTrack = document.getElementById('journey-track');
    let journeyDots = [];
    aligned.forEach((s, i) => {
      const dot = document.createElement('div');
      dot.className = 'journey-dot';
      dot.style.left = (s.pct * 100) + '%';
      journeyTrack.appendChild(dot);
      journeyDots.push(dot);
    });

    // ─── SCROLL-TO-STOP ───
    function scrollToStop(idx) {
      if (idx < 0 || idx >= STOPS.length) return;
      const scrollMax = spacer.offsetHeight - window.innerHeight;

      // Calculate current nearest stop for jump distance
      const p = Math.max(0, Math.min(1, window.scrollY / scrollMax));
      let currentNearest = 0, currentNearestDist = 1;
      STOPS.forEach((s, i) => {
        const d = Math.abs(p - s.pct);
        if (d < currentNearestDist) { currentNearestDist = d; currentNearest = i; }
      });

      // If jumping more than 1 stop away, trigger warp effect
      if (Math.abs(currentNearest - idx) > 1) {
        document.body.classList.add('warping');
        setTimeout(() => document.body.classList.remove('warping'), 800);
      }

      window.scrollTo({ top: STOPS[idx].pct * scrollMax, behavior: 'smooth' });
    }

    // HUD tick clicks
    document.querySelectorAll('.hud-stop').forEach((el, i) => {
      el.addEventListener('click', () => scrollToStop(i));
    });

    function update() {
      const scrollMax = spacer.offsetHeight - window.innerHeight;

      // scrollBy() is deferred by the browser — scrollY won't reflect it
      // until next paint. So we track velocity separately for key input.
      const keyDelta = keysDown.has('w') ? KEY_SCROLL_SPEED :
        keysDown.has('s') ? -KEY_SCROLL_SPEED : 0;
      if (keyDelta !== 0) window.scrollBy({ top: keyDelta, behavior: 'instant' });

      const y = window.scrollY;
      const p = Math.max(0, Math.min(1, y / scrollMax));

      // Scroll velocity: use known key delta when driving, else measure from DOM
      const dy = keyDelta !== 0 ? keyDelta : y - lastScrollY;
      lastScrollY = y;
      scrollVel = scrollVel * 0.85 + dy * 0.15;

      const vw = window.innerWidth;
      const worldW = vw * 3;

      // ── CAR HORIZONTAL POSITION ──
      // p=0: car at 15% (left, beside Welcome sign)
      // p=0 → p1: slides to 50% (center) as user starts driving
      // p=p1 → pN: stays at 50% (center) through all project stops
      // p=pN → 1: slides to 85% (right, beside End sign)
      const p1 = STOPS[0].pct;                    // 0.18
      const pN = STOPS[STOPS.length - 1].pct;     // 0.82
      let carFrac;
      if (p <= p1) {
        carFrac = 0.15 + (0.50 - 0.15) * (p / p1);
      } else if (p >= pN) {
        carFrac = 0.50 + (0.85 - 0.50) * ((p - pN) / (1 - pN));
      } else {
        carFrac = 0.50;
      }
      const carScreenX = carFrac * vw;
      car.style.left = carScreenX + 'px';

      // World X: keeps content at progress p aligned with the car's screen position
      // Derived from: worldX + worldW * (p*9+0.5)/10 = carScreenX
      const worldX = carScreenX - vw * (p * 9 + 0.5);

      // Layers move at different rates for parallax depth
      mtnFar.style.transform = `translateX(${worldX * 0.35}px)`;
      mtnNear.style.transform = `translateX(${worldX * 0.7}px)`;
      world.style.transform = `translateX(${worldX}px)`;
      dashes.style.transform = `translateX(${worldX}px)`;

      // Car bob + reverse flip
      if (scrollVel < -3) isFacingBackward = true;
      else if (scrollVel > 3) isFacingBackward = false;

      const t = performance.now() * 0.003;
      const bob = Math.sin(t) * 1.5 + Math.sin(t * 2.3) * 0.8;
      const tilt = Math.max(-2, Math.min(2, scrollVel * 0.05));
      const scaleX = isFacingBackward ? ' scaleX(-1)' : '';
      car.style.transform = `translateX(-50%) translateY(${bob}px) rotate(${tilt}deg)${scaleX}`;
      reverseTag.classList.toggle('on', isFacingBackward);

      // Wheel spin tied to scroll
      wheelRot += scrollVel * 1.2;
      const wt = `rotate(${wheelRot}deg)`;
      wheelF.style.transform = wt;
      wheelB.style.transform = wt;

      // Speed lines — appear above ~100 km/h
      speedLines.style.opacity = Math.max(0, Math.min(0.85, (Math.abs(scrollVel) - 11) / 7));

      // Dust particles — spawn near rear wheel
      if (Math.abs(scrollVel) > 4 && Math.random() < 0.35) {
        const d = document.createElement('div');
        d.className = 'dust' + (isFacingBackward ? ' rev' : '');
        const rearX = isFacingBackward ? (carScreenX + 70) : (carScreenX - 70);
        const sz = 3 + Math.random() * 5;
        d.style.cssText = `left:${rearX + (Math.random() - 0.5) * 18}px;bottom:${14 + Math.random() * 3}%;width:${sz}px;height:${sz}px;background:rgba(${180 + Math.random() * 40 | 0},${195 + Math.random() * 30 | 0},220,0.55);`;
        stage.appendChild(d);
        setTimeout(() => d.remove(), 780);
      }

      // Skybox parallax drift (stars/nebula move subtly with world)
      const skyOff = worldX * 0.03;
      nebula.style.transform = `translateX(${skyOff}px)`;
      milkyWay.style.transform = `translateX(${skyOff * 0.7}px)`;
      starfield.style.transform = `translateX(${skyOff * 0.5}px)`;
      starsBright.style.transform = `translateX(${skyOff * 0.6}px)`;

      // Dynamic Skybox (shift hue from midnight cyan to purple/pink as you progress)
      const hueShift = p * 130; // 0 to 130 degrees
      sky.style.filter = `hue-rotate(${hueShift}deg)`;
      nebula.style.filter = `blur(1px) hue-rotate(${hueShift}deg)`;
      milkyWay.style.filter = `blur(8px) hue-rotate(${hueShift}deg)`;

      // Celestial Body (Moon -> Sun) arcing across sky
      const moon = document.querySelector('.moon');
      if (moon) {
        // x goes from 5vw to 95vw across the journey
        const moonX = vw * 0.05 + vw * 0.90 * p;
        // y is an inverted parabola: lowest at p=0 and p=1, highest at p=0.5
        // (p * 2 - 1) goes from -1 to 1. Squaring it gives 1 to 0 to 1.
        const arch = Math.pow(p * 2 - 1, 2);
        const moonY = 8 + 30 * arch; // peak at 8%, drops to 38% at edges
        moon.style.left = moonX + 'px';
        moon.style.top = moonY + '%';
        // As it rises, it turns into a sun (hue rotates towards yellow/orange)
        moon.style.filter = `hue-rotate(${p * -50}deg) brightness(${1 + p})`;
      }

      // Update engine audio based on velocity
      if (actx && engineOsc && engineGain) {
        const speed = Math.abs(scrollVel);
        // Pitch goes up as speed increases
        engineOsc.frequency.setTargetAtTime(35 + speed * 1.5, actx.currentTime, 0.1);
        // Volume fades in when moving
        const targetVol = speed > 1 ? Math.min(0.15, speed * 0.01) : 0.03;
        engineGain.gain.setTargetAtTime(targetVol, actx.currentTime, 0.2);
      }

      // Progress bar + journey bar
      progressBar.style.width = (p * 100) + '%';
      if (journeyFill) journeyFill.style.width = (p * 100) + '%';
      if (journeyPos) journeyPos.style.left = (p * 100) + '%';

      // Speedometer: convert scroll velocity to a fake KM/H (capped)
      const speed = Math.min(220, Math.abs(scrollVel) * 9);
      speedoNum.textContent = String(Math.round(speed)).padStart(3, '0');
      speedoFill.style.width = (speed / 220 * 100) + '%';

      // Zooming class: triggers exhaust puff animation when going fast
      if (Math.abs(scrollVel) > 10) {
        if (!car.classList.contains('zooming')) {
          car.classList.add('zooming');
          // restart animation
          const ex = car.querySelector('.exhaust');
          if (ex) { ex.style.animation = 'none'; ex.offsetHeight; ex.style.animation = ''; }
        }
      } else {
        car.classList.remove('zooming');
      }

      // Hide hint after first scroll
      if (y > 30) hint.classList.add('hidden');

      // Find active stop: the one whose target progress is closest to p AND within range
      let nearest = -1;
      let nearestDist = 1;
      aligned.forEach((s, i) => {
        const d = Math.abs(p - s.pct);
        if (d < nearestDist) {
          nearestDist = d;
          nearest = i;
        }
      });

      // Active = within 0.012 of target
      const isActive = nearestDist < 0.012;
      const idx = isActive ? nearest : -1;

      // Brake light: also engage when approaching a stop (within 0.025)
      const approaching = nearestDist < 0.025;
      car.classList.toggle('braking', approaching);

      if (idx !== activeStop) {
        activeStop = idx;
        // Camera shake on arrival at a stop
        if (idx >= 0) {
          stage.classList.remove('arrive');
          stage.offsetHeight;
          stage.classList.add('arrive');
        }
        stopEls.forEach((el, i) => {
          const isThis = i === idx;
          el.classList.toggle('active', isThis);
          // glitch flash on the billboard at the moment we arrive
          if (isThis) {
            const bb = el.querySelector('.billboard');
            if (bb) {
              bb.classList.remove('glitch');
              bb.offsetHeight; // reflow to restart animation
              bb.classList.add('glitch');
            }
          }
        });
        tickEls.forEach((el, i) => {
          el.classList.toggle('active', i === idx);
          el.classList.toggle('passed', idx > -1 ? i < idx : false);
        });
        if (idx >= 0) {
          const s = STOPS[idx];
          cardTitle.textContent = s.title;
          cardEngine.textContent = s.engine;
          cardDesc.textContent = s.desc;
          if (cardIndex) cardIndex.textContent =
            String(idx + 1).padStart(2, '0') + ' / ' + String(STOPS.length).padStart(2, '0');
          // Only switch the video src if it changed (prevents reload flicker)
          if (cardVideo.getAttribute('src') !== s.video) {
            cardVideo.setAttribute('src', s.video);
          }
          cardTags.innerHTML = s.tags.map(t => `<span>${t}</span>`).join('');
          // Populate expanded details
          cardThumbs.innerHTML = (s.images || []).map(src =>
            `<img src="${src}" alt="" loading="lazy">`).join('');
          cardBullets.innerHTML = (s.bullets || []).map(b =>
            `<li>${b}</li>`).join('');
          if (cardProjLink) cardProjLink.href = s.link || '#';
          // Always show the toggle button
          cardLink.style.display = 'inline-flex';
          stopCard.classList.add('active');
          // Preload next stop's video in a hidden element
          if (idx + 1 < STOPS.length) {
            const preloadSrc = STOPS[idx + 1].video;
            if (!preloadEl.src.endsWith(preloadSrc)) preloadEl.src = preloadSrc;
          }
          // Update journey label to show project name
          if (journeyLabel) journeyLabel.textContent = s.title;
        } else {
          stopCard.classList.remove('active', 'expanded');
          if (journeyLabel) journeyLabel.textContent = 'Drive';
        }
      }

      // Journey dots - update every frame (smooth state as you scroll past)
      journeyDots.forEach((dot, i) => {
        dot.classList.toggle('active', i === activeStop);
        dot.classList.toggle('passed', p > aligned[i].pct + 0.04 && i !== activeStop);
      });
    }

    // ─── CARD DETAILS TOGGLE ───
    cardLink.addEventListener('click', () => {
      stopCard.classList.toggle('expanded');
    });

    // ─── STOP CAR SCROLL WHILE HOVERING CARD ───
    // Prevent mouse wheel from driving the car (scroll chaining) when the card is at its top/bottom limit,
    // but allow native scrolling inside the card so you can actually read the details!
    stopCard.addEventListener('wheel', (e) => {
      const isAtTop = stopCard.scrollTop === 0;
      const isAtBottom = Math.ceil(stopCard.scrollTop + stopCard.clientHeight) >= stopCard.scrollHeight;

      // If trying to scroll past the boundaries, prevent default to stop the main page from scrolling
      if ((e.deltaY < 0 && isAtTop) || (e.deltaY > 0 && isAtBottom)) {
        e.preventDefault();
      }
      e.stopPropagation();
    }, { passive: false });

    // ─── KEYBOARD ───
    // W/S and ArrowUp/ArrowDown: smooth continuous scrolling
    const keysDown = new Set();
    const KEY_SCROLL_SPEED = 8.5; // px per frame — matched to feel like scroll wheel

    window.addEventListener('keydown', e => {
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;

      if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        if (!e.repeat) honk();
        return;
      }

      // W / ArrowUp = drive forward (scroll down)
      // S / ArrowDown = drive backward (scroll up)
      if (['w', 'W', 'ArrowUp', 's', 'S', 'ArrowDown'].includes(e.key)) {
        e.preventDefault();
        keysDown.add(e.key.toLowerCase() === 'arrowup' ? 'w' :
          e.key.toLowerCase() === 'arrowdown' ? 's' :
            e.key.toLowerCase());
        return;
      }

      // Esc = collapse expanded card details
      if (e.key === 'Escape') {
        e.preventDefault();
        stopCard.classList.remove('expanded');
        return;
      }

      // Enter = toggle details panel when at a stop
      if (e.key === 'Enter') {
        e.preventDefault();
        if (activeStop >= 0) stopCard.classList.toggle('expanded');
        return;
      }

      // ArrowLeft / ArrowRight / A / D = jump to prev / next stop
      const isLeft = e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a';
      const isRight = e.key === 'ArrowRight' || e.key.toLowerCase() === 'd';
      if (isLeft || isRight) {
        e.preventDefault();
        const scrollMax = spacer.offsetHeight - window.innerHeight;
        const p = Math.max(0, Math.min(1, window.scrollY / scrollMax));
        let nearest = 0, nearestDist = 1;
        STOPS.forEach((s, i) => {
          const d = Math.abs(p - s.pct);
          if (d < nearestDist) { nearestDist = d; nearest = i; }
        });
        const delta = isRight ? 1 : -1;
        const target = (nearestDist < 0.08) ? nearest + delta : nearest + (delta > 0 ? 0 : -1);
        scrollToStop(Math.max(0, Math.min(STOPS.length - 1, target)));
      }
    }, { passive: false });

    // Initialize audio on first interaction
    window.addEventListener('keydown', initAudio, { once: true });
    window.addEventListener('click', initAudio, { once: true });
    window.addEventListener('wheel', initAudio, { once: true });

    window.addEventListener('keyup', e => {
      const k = e.key.toLowerCase();
      keysDown.delete(k);
      keysDown.delete(k === 'arrowup' ? 'w' : k === 'arrowdown' ? 's' : k);
    });

    // Keyboard scroll is now applied inside update() above (single rAF loop)

    // ─── AUDIO ENGINE ───
    let actx = null;
    let engineOsc = null;
    let engineGain = null;

    function initAudio() {
      if (actx) return;
      actx = new (window.AudioContext || window.webkitAudioContext)();

      // Engine sound: a low sawtooth wave
      engineOsc = actx.createOscillator();
      engineOsc.type = 'sawtooth';
      engineOsc.frequency.value = 35; // Idle rumble

      // Filter to muffle it so it sounds like a low hum
      const filter = actx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 120;

      // Gain to control volume
      engineGain = actx.createGain();
      engineGain.gain.value = 0; // Starts silent

      engineOsc.connect(filter);
      filter.connect(engineGain);
      engineGain.connect(actx.destination);
      engineOsc.start();
    }

    function playHonk() {
      if (!actx) initAudio();

      // Two dissonant square waves for a classic car horn
      const hOsc1 = actx.createOscillator();
      const hOsc2 = actx.createOscillator();
      hOsc1.type = 'square';
      hOsc2.type = 'square';
      hOsc1.frequency.value = 350;
      hOsc2.frequency.value = 390;

      const hGain = actx.createGain();
      hGain.gain.setValueAtTime(0, actx.currentTime);
      hGain.gain.linearRampToValueAtTime(0.04, actx.currentTime + 0.05);
      hGain.gain.setValueAtTime(0.04, actx.currentTime + 0.3);
      hGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.4);

      hOsc1.connect(hGain);
      hOsc2.connect(hGain);
      hGain.connect(actx.destination);

      hOsc1.start();
      hOsc2.start();
      hOsc1.stop(actx.currentTime + 0.4);
      hOsc2.stop(actx.currentTime + 0.4);
    }

    // ─── HONK ───
    function honk() {
      playHonk();
      honkFlash.classList.remove('go');
      honkText.classList.remove('go');
      // reflow so animation restarts cleanly
      honkFlash.offsetHeight; honkText.offsetHeight;
      honkFlash.classList.add('go');
      honkText.classList.add('go');
      // jiggle the car
      car.animate(
        [
          { transform: 'translateX(-50%) translateY(0) rotate(0deg)' },
          { transform: 'translateX(-50%) translateY(-4px) rotate(-2deg)' },
          { transform: 'translateX(-50%) translateY(0) rotate(2deg)' },
          { transform: 'translateX(-50%) translateY(0) rotate(0deg)' }
        ],
        { duration: 280, iterations: 1 }
      );
    }

    // Hidden element for preloading the next stop's video
    const preloadEl = document.createElement('video');
    preloadEl.muted = true;
    preloadEl.preload = 'auto';
    preloadEl.style.cssText = 'display:none;position:absolute;width:0;height:0;';
    document.body.appendChild(preloadEl);

    let raf = null;
    function tick() {
      update();
      raf = requestAnimationFrame(tick);
    }
    tick();

    // ─── Custom cursor ───
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      cursor.style.opacity = '1';
    });
    document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hov'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hov'));
    });
  </script>
</body>

</html>
